name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Format check
        run: test -z "$(gofmt -l ./cmd ./internal)"

      - name: Vet
        run: go vet ./...

      - name: Tests
        env:
          MDPROOF_ALLOW_EXECUTE: "1"
        run: go test -race ./...

  release:
    needs: test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          VERSION="${GITHUB_REF_NAME}"
          EXT=""
          if [ "$GOOS" = "windows" ]; then EXT=".exe"; fi
          BINARY="mdproof-${VERSION}-${GOOS}-${GOARCH}${EXT}"
          go build -trimpath -ldflags="-s -w -X main.version=${VERSION}" -o "${BINARY}" ./cmd/mdproof
          echo "BINARY=${BINARY}" >> "$GITHUB_ENV"

      - name: Package
        run: |
          if echo "$BINARY" | grep -q '\.exe$'; then
            ARCHIVE="${BINARY%.exe}.zip"
            zip "${ARCHIVE}" "$BINARY"
          else
            ARCHIVE="${BINARY}.tar.gz"
            tar czf "${ARCHIVE}" "$BINARY"
          fi
          echo "ARTIFACT=${ARCHIVE}" >> "$GITHUB_ENV"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT }}
          path: ${{ env.ARTIFACT }}

  publish:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        working-directory: dist
        run: sha256sum * > checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*
